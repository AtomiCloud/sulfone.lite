cyanprint: 4
kind: template
owner: cyanprint
name: template-resolver-1
bundledEntry: cyan.ts
processors:
  - cyan/default
resolvers:
  - ref: cyanprint/resolver2
    files: ['.gitignore']
  - ref: cyanprint/resolver1
    config: { arrayStrategy: concat }
    files: ['c1.json']
  - ref: cyanprint/resolver1
    config: { arrayStrategy: replace }
    files: ['c2.json']
  - ref: cyanprint/resolver1
    config: { arrayStrategy: distinct }
    files: ['c3.json']
