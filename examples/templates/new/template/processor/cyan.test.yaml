cases:
  - name: basic
    input: tests/basic/input
    expected: tests/basic/expected
    validations:
      - path: README.md
        notContains: '   '
    commands:
      - command: bun
        args:
          - --eval
          - |
            const text = await Bun.file("README.md").text();
            if (text.includes("   ")) process.exit(1);
