    content: >
      # CyanPrint Searching Skill


      Use this before adding a dependency.


      - Search resolvers: `cyanprint search --kind resolver <query>`.

      - Prefer one resolver per conflict family and document config
      compatibility.
  - path: .cyan/skills/cyanprint-updating.md
    sha256: 5c842fcc8bc3bf53fb00de1fd4405007f8bd8a044fae5c388590cb81bc4b5150
    content: >
      # CyanPrint Updating Skill


      Use this when changing behavior.


      - Update resolver fixtures and expected output together.

      - Run `cyanprint test .` before publishing.

      - Include cases for same resolver config, different config, and no
      resolver when relevant.
  - path: .github/workflows/ci.yml
    sha256: 80d3b8f3c1632b93cb7fb10112137e2c81bd7186074f833a7beaeb946a01938a
    content: >
      name: cyanprint


      on:
        push:
        pull_request:

      jobs:
        test:
          runs-on: ubuntu-latest
          env:
            GEMFURY_READ_TOKEN: ${{ secrets.GEMFURY_READ_TOKEN }}
          steps:
            - uses: actions/checkout@v4
            - name: Install CyanPrint from Gemfury
              run: |
                set -euo pipefail
                repo_url="https://apt.fury.io/atomicloud/"
                if [ -n "${GEMFURY_READ_TOKEN:-}" ]; then
                  repo_url="https://${GEMFURY_READ_TOKEN}@apt.fury.io/atomicloud/"
                fi
                printf 'deb [trusted=yes] %s /\n' "$repo_url" | sudo tee /etc/apt/sources.list.d/atomicloud-gemfury.list >/dev/null
                sudo apt-get update
                sudo apt-get install -y cyanprint
            - name: Test artifact
              run: cyanprint test .
  - path: cyan.test.yaml
    sha256: eb4e8075a1c22b6743e5d35369669c011ad70ac749d9b8cf77869f94ddcd6124
    content: |
      cases:
        - name: latest-wins
          resolverInputs:
            - path: tests/latest-wins/current.txt
              origin:
                template: current
                layer: 1
            - path: tests/latest-wins/target.txt
              origin:
                template: target
                layer: 2
          expected: tests/latest-wins/expected.txt
          validations:
            - grep -q target output.txt
