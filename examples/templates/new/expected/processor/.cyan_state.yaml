    sha256: 1f338dd66f5ad88af0ecbd11c25e9c9445abe06bf2149862fd7414dce77db4ca
    content: >
      # Trim Lines Processor


      A CyanPrint v4 processor.


      This processor receives `{ files, config }` and returns a file map. Use
      processors for deterministic file transformations after template files are
      loaded.


      ## Test


      ```bash

      cyanprint test .

      ```


      ## Push


      ```bash

      cyanprint push . --token "$CYANPRINT_TOKEN"

      ```
  - path: src/index.ts
    sha256: 2dec89d38a4521103e28dfbcc5ccdd1989cf6ff82adcabbd3dfc2c77447217ca
    content: >
      export function processor(input: { files: Record<string, string> }) {
        return Object.fromEntries(
          Object.entries(input.files).map(([path, content]) => [path, String(content).replace(/[ \t]+$/gm, '')]),
        );
      }
