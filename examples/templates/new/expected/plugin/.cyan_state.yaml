    sha256: 0f4b7fd8988db8bcf64b4362b347ddcb6da1bd1b52b2f5813655bb9009239da0
    content: >
      # Footer Plugin


      A CyanPrint v4 plugin.


      This plugin receives `{ files, config }` and returns a file map. Use
      plugins for additive or final project edits after processors.


      ## Test


      ```bash

      cyanprint test .

      ```


      ## Push


      ```bash

      cyanprint push . --token "$CYANPRINT_TOKEN"

      ```
  - path: src/index.ts
    sha256: dff7732e14e71d56aaaf5d8a8c2647b1acbe71578ec3175eaa4762f58e45635a
