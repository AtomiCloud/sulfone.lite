  - path: README.md
    sha256: c30f43e7e3bdf7d663f0956cd74f429b0d1b359f2a01bff55ff07f04310cba8a
    content: >
      # Service Template


      A CyanPrint v4 template.


      This artifact is a folder-first CyanPrint template. It asks questions in
      `cyan.ts`, returns pure data, and lets the CyanPrint CLI run processors
      and merge output.


      ## Test


      ```bash

      cyanprint test . --answers answers.json

      ```


      ## Push


      ```bash

      cyanprint push . --token "$CYANPRINT_TOKEN"

      ```
