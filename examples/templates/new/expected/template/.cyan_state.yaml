files:
  - path: .cyan/skills/cyanprint-authoring.md
    sha256: 1e06cd43d72e66cef1258ef576f59317a345a00a7e06339b163315121711568b
    content: >
      # CyanPrint Authoring Skill


      Use this when creating or editing this artifact.


      - Keep `cyan.yaml`, `README.md`, and the bundled entry aligned.

      - Keep runtime code local-first and deterministic.

      - Templates return pure Cyan data from `cyan.ts`; do not read or write the
      target project directly.

      - Runtime artifacts export one named function: `processor`, `plugin`, or
      `resolver`.

      - Declare every dependency in `cyan.yaml`; returned refs must be declared.
  - path: .cyan/skills/cyanprint-documenting.md
    sha256: ec76f2655e3fb643c816b652ef23e4fac1130a79827a88e865aa511899909d0e
    content: |
      # CyanPrint Documenting Skill

      Use this when updating README or examples.

      - Explain what the artifact does.
      - List required dependencies and why they exist.
      - Show one test command and one push command.
      - Keep examples copy-pasteable and headless-friendly.
  - path: .cyan/skills/cyanprint-pushing.md
    sha256: 1fcecfa373d93ff509929f72171ca070c4152bef9ff42825fd205d846fa770cf
    content: >
      # CyanPrint Pushing Skill


      Use this before publishing.


      - Run tests locally first.

      - Use `cyanprint push . --token "$CYANPRINT_TOKEN"`.

      - Let the registry assign the next integer version.

      - Do not hand-edit pinned dependency versions in generated registry
      payloads.
  - path: .cyan/skills/cyanprint-searching.md
    sha256: 24b1d7898f18bbe09c3c8968430eae327b06cd19ba3ddce45e33cba307163112
    content: >
      # CyanPrint Searching Skill


      Use this before adding a dependency.


      - Search templates: `cyanprint search --kind template <query>`.

      - Search processors: `cyanprint search --kind processor <query>`.

      - Search plugins: `cyanprint search --kind plugin <query>`.

      - Search resolvers: `cyanprint search --kind resolver <query>`.

      - Prefer stable, declared registry refs over copying behavior into this
      artifact.
  - path: .cyan/skills/cyanprint-updating.md
    sha256: cc0a64484379f4021cdc6a1202f52c0542b60babc0087fd4846d9ea6bcc13dcd
    content: >
      # CyanPrint Updating Skill


      Use this when changing behavior.


      - Update fixtures and expected output together.

      - Run `cyanprint test .` before publishing.

      - For templates, run `cyanprint test . --update-snapshots` only when
      changed output is intended.

      - For resolver behavior, include same-resolver, different-config, and
      no-resolver edge cases when relevant.
  - path: .github/workflows/ci.yml
    sha256: 35d420fbefe33515094d807e019629a9b505127cdfca57083e2f9edf4e69400e
    content: >
      name: cyanprint


      on:
        push:
        pull_request:

      jobs:
        test:
          runs-on: ubuntu-latest
          env:
            GEMFURY_READ_TOKEN: ${{ secrets.GEMFURY_READ_TOKEN }}
          steps:
            - uses: actions/checkout@v4
            - name: Install CyanPrint from Gemfury
              run: |
                set -euo pipefail
                repo_url="https://apt.fury.io/atomicloud/"
                if [ -n "${GEMFURY_READ_TOKEN:-}" ]; then
                  repo_url="https://${GEMFURY_READ_TOKEN}@apt.fury.io/atomicloud/"
                fi
                printf 'deb [trusted=yes] %s /\n' "$repo_url" | sudo tee /etc/apt/sources.list.d/atomicloud-gemfury.list >/dev/null
                sudo apt-get update
                sudo apt-get install -y cyanprint
            - name: Test artifact
              run: cyanprint test . --answers answers.json
