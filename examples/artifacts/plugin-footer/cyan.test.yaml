cases:
  - name: basic
    input: tests/basic/input
    expected: tests/basic/expected
    validations:
      - command: bun
        args:
          - --eval
          - |
            const text = await Bun.file("README.md").text();
            if (!text.includes("Generated locally.")) process.exit(1);
            if (text.includes("Generated remotely.")) process.exit(1);
