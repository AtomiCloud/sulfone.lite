cases:
  - name: latest-wins
    variations:
      - path: tests/latest-wins/input-0
        origin: { template: cyanprint/base, layer: 0 }
      - path: tests/latest-wins/input-1
        origin: { template: cyanprint/overlay, layer: 1 }
    expected: tests/latest-wins/expected
    validations:
      - grep -q 'overlay edit' README.md
      - "! grep -q 'base edit' README.md"
  - name: three-layers
    variations:
      - path: tests/three-layers/input-0
        origin: { template: cyanprint/first, layer: 0 }
      - path: tests/three-layers/input-1
        origin: { template: cyanprint/second, layer: 1 }
      - path: tests/three-layers/input-2
        origin: { template: cyanprint/third, layer: 2 }
    expected: tests/three-layers/expected
    validations:
      - grep -q 'layer two' notes.txt
