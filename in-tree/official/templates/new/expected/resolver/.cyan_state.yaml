    sha256: 1519641bc4469824ea9f8cc0b8ce873459f98b907c03f83ea9535f7c3bfd5709
    content: >
      # CyanPrint Authoring Skill


      Use this when creating or editing this artifact. The goal is to leave the
      artifact deterministic, folder-first, easy to test, and easy for another
      agent to continue.


      ## Artifact Contract


      - Keep `cyan.yaml`, `README.md`, `package.json`, tests, and the bundled
      entry aligned.

      - Keep execution local-first. Do not require Docker or server-side
      execution.

      - Declare every template, processor, plugin, and resolver dependency in
      `cyan.yaml`. Runtime output may only reference declared dependencies.

      - Keep versions out of authored dependency refs unless intentionally
      pinning an older version. Push resolves omitted versions and pins them.

      - Run generated code through Bun and TypeScript-compatible APIs only.


      ## Templates


      A good template is a folder plus a small `cyan.ts` planner. It should ask
      focused questions, return pure data, and never write directly to the
      target project.


      Recommended shape:


      ```ts

      export default async function cyan(prompt) {
        const project = await prompt.text('project', 'Project name', { default: 'Keep Latest Resolver App' });

        return {
          processors: [
            {
              name: 'cyan/default',
              files: [{ root: 'template', glob: '**/*', type: 'Template' }],
              config: { vars: { PROJECT: project, TITLE: 'Keep Latest Resolver' } },
            },
          ],
        };
      }

      ```


      Rules for template quality:


      - Put generated files under `template/`; do not inline file bodies in
      `cyan.ts` unless the file is tiny and dynamic by nature.

      - Use `type: 'Template'` for text files that need variables. Use `type:
      'Copy'` for binary assets, images, fonts, lockfiles, or any file that
      should not be UTF-8 rendered.

      - Keep prompts deterministic. Defaults should produce a valid project
      without extra user input.

      - Prefer one clear question over many clever ones. If a dependency
      template needs an answer, pass it explicitly through presets or returned
      template data.

      - Include resolvers when multiple templates may touch the same path. Same
      resolver + same config should merge commutatively; no resolver should be
      an intentional last-writer-wins choice.


      ## Processors and Plugins


      Processors and plugins receive `{ files, config }` and return a complete
      file map.


      - Processors should be deterministic transforms: render, format,
      normalize, sort, or validate output.

      - Plugins should add or make final edits after processors. Keep plugin
      behavior explicit and narrow.

      - Never mutate hidden global state. Never read the target project
      directly.

      - Preserve unrelated files unless the artifact is intentionally replacing
      them.

      - If importing packages, add them to `package.json` and run `bun run
      build` before test or push.


      ## Resolvers


      Resolvers receive every candidate for the same path as `{ files, config }`
      and return one folded result.


      - Treat resolver input order as meaningful only through explicit metadata
      such as `origin.layer`.

      - Make equal inputs idempotent.

      - Document when the resolver prefers user content, generated content,
      latest layer, or a structured merge.

      - Add fixtures for at least: clean merge, same resolver same config,
      different config, and no-resolver fallback when relevant.


      ## Build and Bundle


      This scaffold includes `package.json` scripts. Use them as the default
      path:


      ```bash

      bun install

      bun run build

      bun run test

      ```


      `bun run build` produces the bundled entry under `dist/`. That bundle is
      what gets uploaded for runtime artifacts, and it is what keeps imports
      from packages deterministic.
  - path: .cyan/skills/cyanprint-documenting.md
    sha256: cb378980f9f4ca464fc70479eda28f4df86abce778e6dcd7eb4adb74a1c3a9c5
    content: >
      # CyanPrint Documenting Skill


      Use this when updating README, examples, or docs inside this artifact. The
      README should let a human or agent use the artifact without reading the
      implementation first.


      ## README Structure


      Include these sections in order when they apply:


      1. Title and one-sentence purpose.

      2. What the artifact generates or transforms.

      3. Inputs: prompts, config keys, expected files, and dependency refs.

      4. Outputs: generated files, renamed paths, resolver behavior, or plugin
      additions.

      5. Dependencies and why each is declared in `cyan.yaml`.

      6. Build/test commands.

      7. Push command and token requirement.

      8. Compatibility notes and known merge behavior.


      ## Writing Good Examples


      - Prefer commands that work from the artifact folder.

      - Show headless commands with answer files when prompts exist.

      - Mention `bun run build` before `cyanprint test` if `bundledEntry` is
      under `dist/`.

      - Keep examples copy-pasteable; avoid placeholders except for secrets like
      `$CYANPRINT_TOKEN`.


      ## Template Documentation


      For templates, document:


      - every prompt and default

      - the folder roots copied or rendered

      - processors used per root

      - binary asset handling with `Copy`

      - resolver expectations when files overlap with dependency templates


      ## Runtime Artifact Documentation


      For processors, plugins, and resolvers, document:


      - the exact input shape

      - all config keys and defaults

      - what is preserved, modified, added, or removed

      - fixture names and what each fixture proves
  - path: .cyan/skills/cyanprint-pushing.md
    sha256: e19c2ca0f12d533263e7f02ac7fb7d77470385e5ffc6ede7ce784b1440b69ecb
    content: >
      # CyanPrint Pushing Skill


      Use this before publishing to a registry.


      ## Pre-Push Checklist


      - `cyan.yaml` has the right `kind`, `owner`, `name`, `entry`, and
      `bundledEntry`.

      - All dependencies are declared as friendly refs under the correct
      section.

      - `README.md` explains behavior, config, tests, and compatibility.

      - `bun run build` succeeds and writes the bundled entry.

      - `bun run test` succeeds.

      - No generated secrets, local cache files, or temporary output are
      included in the artifact folder.


      ## Publish


      Use an API token minted from the CyanPrint web portal:


      ```bash

      CYANPRINT_TOKEN='<token>' bun run push

      ```


      The registry assigns the next integer version. Do not hand-edit
      registry-assigned versions. If dependency versions are omitted in
      `cyan.yaml`, push resolves and pins them during publish.


      ## Dry Run


      Before publishing a new artifact shape, run:


      ```bash

      cyanprint push . --dry-run

      ```


      Dry run validates the manifest, bundle, dependencies, object model, and
      archive rules without committing a version.
  - path: .cyan/skills/cyanprint-searching.md
    sha256: 781e3dfa7c9033a748d48aec045faeb967c3dba3eb4c57e2b995f0233f0330f2
    content: >
      # CyanPrint Searching Skill


      Use this before adding or changing dependencies.


      ## Search Commands


      ```bash

      cyanprint search <query>

      cyanprint search --kind template <query>

      cyanprint search --kind processor <query>

      cyanprint search --kind plugin <query>

      cyanprint search --kind resolver <query>

      ```


      ## Choosing Dependencies


      - Prefer official `cyan/*` artifacts when they fit.

      - Prefer a resolver over last-writer-wins when two templates write the
      same path intentionally.

      - Avoid copying dependency behavior into this artifact unless the behavior
      is truly private to this artifact.

      - Add dependencies to `cyan.yaml` without versions unless you
      intentionally need an older pinned version.

      - After adding a dependency, add a test fixture that proves the dependency
      is invoked and that the returned artifact ref is declared.


      ## Search in the Web UI


      Use the registry search page for discovery and README review. Keep the URL
      query when sharing a dependency candidate with another agent so they see
      the same kind filter and query.
  - path: .cyan/skills/cyanprint-updating.md
    sha256: 1fe85e623d1b25ee280345dea345f1126a09d7346f36371d5947bcb19a13e0cd
    content: >
      # CyanPrint Updating Skill


      Use this when changing behavior, fixtures, prompts, dependencies, or
      generated output.


      ## Update Checklist


      1. Read `cyan.yaml` and identify the artifact kind.

      2. Read `README.md` and the relevant `.cyan/skills/*` files before editing
      behavior.

      3. Update source and fixture files together. Do not change behavior
      without a test fixture that shows the new output.

      4. Run `bun run build` when `cyan.ts` or `src/index.ts` imports packages
      or when `bundledEntry` points into `dist/`.

      5. Run `bun run test` or the equivalent `cyanprint test .` command.

      6. Update README examples and dependency notes if the public behavior
      changed.


      ## Template Updates


      For templates, update all three layers together:


      - `cyan.ts` prompt and returned pure Cyan object

      - files under `template/`

      - expected output fixtures under `expected/`


      Use snapshot updates only when the output change is intentional:


      ```bash

      bun run build

      cyanprint test . --answers answers.json --update-snapshots

      ```


      Then inspect the changed expected files manually. A snapshot update is not
      a substitute for review.


      ## Processor and Plugin Updates


      - Add or update `tests/<case>/input` and `tests/<case>/expected`.

      - Use `config` in `cyan.test.yaml` for behavior that depends on options.

      - Include command validations for behavior that is easier to assert with
      code, such as JSON parseability, package installability, or exact
      formatting.


      ## Resolver Updates


      - Include fixtures that represent actual conflict shapes.

      - Keep resolver config small and serializable.

      - Verify expired assumptions: if a resolver used to receive two files, add
      a test for three or more files if multiple templates can now converge on
      the path.
  - path: .github/workflows/ci.yml
    sha256: 40dfb6ad1af58fe663c317ef70de727355f3c0df7694f22a990b06fa6dead54a
    content: >
      name: cyanprint


      on:
        push:
        pull_request:

      jobs:
        test:
          runs-on: ubuntu-latest
          env:
            GEMFURY_READ_TOKEN: ${{ secrets.GEMFURY_READ_TOKEN }}
          steps:
            - uses: actions/checkout@v4
            - name: Install CyanPrint from Gemfury
              run: |
                set -euo pipefail
                repo_url="https://apt.fury.io/atomicloud/"
                if [ -n "${GEMFURY_READ_TOKEN:-}" ]; then
                  repo_url="https://${GEMFURY_READ_TOKEN}@apt.fury.io/atomicloud/"
                fi
                printf 'deb [trusted=yes] %s /\n' "$repo_url" | sudo tee /etc/apt/sources.list.d/atomicloud-gemfury.list >/dev/null
                sudo apt-get update
                sudo apt-get install -y cyanprint
            - name: Test artifact
              run: bun run test
