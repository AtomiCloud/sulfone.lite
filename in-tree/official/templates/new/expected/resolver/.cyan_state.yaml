    content: >
      # Keep Latest Resolver


      A CyanPrint v4 resolver.


      This resolver receives all versions of the same path and folds them into
      one output. Use resolvers when multiple templates may touch the same file.


      ## Test


      ```bash

      bun run test

      ```


      ## Push


      ```bash

      CYANPRINT_TOKEN="<token>" bun run push

      ```
  - path: src/index.ts
    sha256: 4ec451299276182ca209ff9e102aa2e21f42b426d4d02eab9c25f7ccfe6cb657
    content: >
      export function resolver(input: { files: Array<{ content: string; origin:
      { layer: number } }> }) {
        const latest = [...input.files].sort((left, right) => right.origin.layer - left.origin.layer)[0];
        return latest?.content ?? '';
      }
