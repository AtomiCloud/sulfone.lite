  - path: .cyan/skills/cyanprint-authoring.md
    sha256: e5f3b779ec7df3a4659f2fc7b5fc2a4d634511d293b0535a186dc4163c1bfcb8
    content: >
      # CyanPrint Authoring Skill


      Use this when creating or editing this artifact. The goal is to leave the
      artifact deterministic, folder-first, easy to test, resolver-friendly, and
      easy for another agent to continue.


      ## Artifact Contract


      - Keep `cyan.yaml`, `README.md`, `package.json`, tests, and the bundled
      entry aligned.

      - Keep execution local-first. Do not require Docker or server-side
      execution.

      - Declare every template, processor, plugin, and resolver dependency in
      `cyan.yaml`. Runtime output may only reference declared dependencies.

      - Keep versions out of authored dependency refs unless intentionally
      pinning an older version. Push resolves omitted versions and pins them.

      - Run generated code through Bun and TypeScript-compatible APIs only.

      - Keep runtime returns pure data. `cyan.ts`, processors, plugins, and
      resolvers should not smuggle functions in returned objects.


      ## Templates


      A good template is a folder plus a small `cyan.ts` planner. It should ask
      focused questions, return pure data, and never write directly to the
      target project.


      Recommended shape:


      ```ts

      export default async function cyan(prompt) {
        const project = await prompt.text('project', 'Project name', { default: 'Keep Latest Resolver App' });

        return {
          processors: [
            {
              name: 'cyan/default',
              files: [{ root: 'template', glob: '**/*', type: 'Template' }],
              config: { vars: { PROJECT: project, TITLE: 'Keep Latest Resolver' } },
            },
          ],
          resolvers: [{ name: 'cyan/keep-user', config: { paths: ['README.md'] } }],
        };
      }

      ```


      Rules for template quality:


      - Put generated files under `template/`; do not inline file bodies in
      `cyan.ts` unless the file is tiny and dynamic by nature.

      - Use `type: 'Template'` for text files that need variables. Use `type:
      'Copy'` for binary assets, images, fonts, lockfiles, or any file that
      should not be UTF-8 rendered.

      - Keep prompts deterministic. Defaults should produce a valid project
      without extra user input.

      - Prefer one clear question over many clever ones. If a dependency
      template needs an answer, pass it explicitly through presets or returned
      template data.

      - Think about processors before adding files. Markdown, JSON, YAML,
      package manifests, Nix files, and generated code should have a
      deterministic processor or formatter path.

      - Think about resolvers before writing common paths. Common overlap paths
      include `README.md`, `.gitignore`, `.dockerignore`, `.env.example`,
      `flake.nix`, `package.json`, `tsconfig.json`, `.github/workflows/*`,
      `.claude/*`, `.codex/*`, `AGENTS.md`, and other agent or IDE files.

      - If a file may be touched by more than one template, either add a
      resolver dependency and config, or document that last-writer-wins is
      intentional.

      - Prefer resolver-friendly structure. For lists, keep one item per line.
      For generated sections, use stable headings or markers. For config files,
      preserve sorted keys where that is the ecosystem norm.

      - Keep dependency templates explicit. If this template invokes `cyan/nix`,
      `cyan/workspace`, `cyan/readme`, or another base template, pass
      deterministic answers to it and test the combined output.


      ## Processors


      Processors receive `{ files, config }` and return a complete file map.
      They should behave like pure deterministic functions:


      ```txt

      same input files + same config + same processor version => same output
      files

      ```


      Processor rules:


      - Do not read wall-clock time, random values, host-specific paths,
      environment variables, network resources, or the target project unless
      those values are explicit config inputs.

      - Sort file paths, object keys, imports, and generated arrays when order
      is not semantically meaningful.

      - Preserve binary files and unknown files unless the processor explicitly
      owns them.

      - Treat config as part of the input contract. Validate config up front and
      fail with clear messages.

      - Make output stable across platforms. Normalize newlines, path
      separators, and trailing whitespace intentionally.

      - Add fixtures that prove input to output determinism. Run the same test
      twice and make sure the second run has no diff.


      Good processor examples:


      - Render Eta templates with a fixed `vars` object.

      - Format Markdown, JSON, TypeScript, YAML, or Nix files with pinned
      dependencies.

      - Normalize package manifests by sorting scripts and dependencies.


      Bad processor examples:


      - Adding `generatedAt: new Date()`.

      - Reading local Git author info without config.

      - Reordering file sections based on filesystem traversal order.


      ## Plugins


      Plugins receive `{ files, config }` and return a complete file map after
      processors run. Use plugins for project-level finalization that is still
      deterministic and idempotent.


      Plugin rules:


      - A plugin must be safe to run twice. The second run should not duplicate
      lines, sections, hooks, or files.

      - Prefer file-map edits over shell commands. If a command is needed,
      document it and make it optional or validated.

      - Use plugins for narrow final steps such as adding pre-commit config,
      initializing Git metadata idempotently, adding CI helper files, or running
      a declared formatting command.

      - For pre-commit behavior, prefer generating `.pre-commit-config.yaml`
      plus a validation command such as `pre-commit run --all-files`. Do not
      assume the host already has hooks installed.

      - For Git initialization, only create missing files or config. Never
      overwrite user remotes, branches, ignored files, or identity.

      - Record every plugin side effect in README and tests.


      ## Resolvers


      Resolvers receive every candidate for the same path as `{ files, config }`
      and return one folded result.


      Resolver rules:


      - Design the resolver as a fold over an array of candidates, not as a
      special two-file merge.

      - Make equal inputs idempotent.

      - Make the merge commutative when the resolver claims order does not
      matter. `fold([a, b, c])` should match `fold([c, a, b])` for unordered
      config.

      - If order matters, make the order source explicit through metadata such
      as `origin.layer`, `origin.template`, or `origin.version`, then document
      that policy.

      - Document when the resolver prefers user content, generated content,
      latest layer, or a structured merge.

      - Keep resolver config small, serializable, and comparable. Same resolver
      plus same config is what allows CyanPrint to merge instead of reporting a
      resolver mismatch.

      - Add fixtures for at least: clean merge, repeated identical input,
      reversed input order, three or more candidates, different config, and
      no-resolver fallback when relevant.


      Resolver-friendly file design:


      - Markdown: stable headings and bounded generated sections.

      - Ignore files: sorted unique lines with comments preserved when possible.

      - JSON/YAML/package files: parse and merge structurally, then emit stable
      sorted output.

      - Nix files: prefer isolated imports/modules over editing one large
      expression.

      - Agent docs: append or merge named sections, never rely on vague prose
      matching.


      ## Build and Bundle


      This scaffold includes `package.json` scripts. Use them as the default
      path:


      ```bash

      bun install

      bun run build

      bun run test

      ```


      `bun run build` produces the bundled entry under `dist/`. That bundle is
      what gets uploaded for runtime artifacts, and it is what keeps imports
      from packages deterministic.
  - path: .cyan/skills/cyanprint-documenting.md
    sha256: 52ebc70bf33a56cf4104586ea622bc6430b188e33e7b70ce656f5ffc9ea0f098
    content: >
      # CyanPrint Documenting Skill


      Use this when updating README, examples, or docs inside this artifact. The
      README should let a human or agent use the artifact without reading the
      implementation first.


      ## README Structure


      Include these sections in order when they apply:


      1. Title and one-sentence purpose.

      2. What the artifact generates, transforms, folds, or finalizes.

      3. Inputs: prompts, config keys, expected files, and dependency refs.

      4. Outputs: generated files, renamed paths, resolver behavior, plugin
      additions, or validation commands.

      5. Dependencies and why each is declared in `cyan.yaml`.

      6. Processor and resolver plan for files that commonly overlap.

      7. Build/test commands.

      8. Push command and token requirement.

      9. Compatibility notes and known merge behavior.


      ## Writing Good Examples


      - Prefer commands that work from the artifact folder.

      - Show headless commands with answer files when prompts exist.

      - Mention `bun run build` before `cyanprint test` if `bundledEntry` is
      under `dist/`.

      - Keep examples copy-pasteable; avoid placeholders except for secrets like
      `$CYANPRINT_TOKEN`.

      - Include the exact command that proves the artifact locally, not just the
      command that publishes it.


      ## Template Documentation


      For templates, document:


      - every prompt and default

      - dependency templates and any forced answers passed to them

      - the folder roots copied or rendered

      - processors used per root and why each processor is needed

      - binary asset handling with `Copy`

      - files that commonly overlap, such as `README.md`, `.gitignore`,
      `.dockerignore`, `flake.nix`, package manifests, CI, Claude/Codex/agent
      docs, and IDE files

      - resolver expectations when files overlap with dependency templates

      - what happens when no resolver is declared for an overlapping path


      ## Processor Documentation


      For processors, document:


      - the exact `{ files, config }` input shape

      - all config keys and defaults

      - deterministic behavior guarantees

      - what file types are preserved, modified, added, or removed

      - package dependencies used by the bundled processor

      - fixture names and what each fixture proves

      - validation commands, especially parseability and formatting checks


      ## Plugin Documentation


      For plugins, document:


      - the exact `{ files, config }` input shape

      - all config keys and defaults

      - when the plugin runs relative to processors

      - every finalizer side effect

      - idempotency guarantees

      - whether shell commands are required, optional, or only used for
      validation

      - pre-commit, Git, formatter, or package-manager assumptions


      ## Resolver Documentation


      For resolvers, document:


      - the candidate array shape

      - all config keys and defaults

      - whether the fold is commutative

      - whether duplicate inputs are idempotent

      - the order policy when order matters

      - how user edits, generated files, dependency layers, and template
      versions are prioritized

      - fixture names for clean merge, reversed order, duplicate candidates,
      three or more candidates, conflict, and mismatched config
  - path: .cyan/skills/cyanprint-pushing.md
    sha256: 4009256222b59b18f73af643e6c5409c524cc679989855720f2fd8b6b116a635
    content: >
      # CyanPrint Pushing Skill


      Use this before publishing to a registry.


      ## Pre-Push Checklist


      - `cyan.yaml` has the right `kind`, `owner`, `name`, `entry`, and
      `bundledEntry`.

      - All dependencies are declared as friendly refs under the correct
      section.

      - `README.md` explains behavior, config, tests, merge policy, and
      compatibility.

      - `bun run build` succeeds and writes the bundled entry.

      - `bun run test` succeeds.

      - No generated secrets, local cache files, or temporary output are
      included in the artifact folder.

      - Processor and plugin output is deterministic for the same input and
      config.

      - Resolver fixtures prove commutativity or clearly document ordered
      behavior.

      - Template fixtures cover dependency answers, processor selection,
      common-file overlap, and resolver behavior.

      - Plugin fixtures prove idempotency for finalizers such as pre-commit
      config and Git initialization.


      ## Publish


      Use an API token minted from the CyanPrint web portal:


      ```bash

      CYANPRINT_TOKEN='<token>' bun run push

      ```


      The registry assigns the next integer version. Do not hand-edit
      registry-assigned versions. If dependency versions are omitted in
      `cyan.yaml`, push resolves and pins them during publish.


      ## Dry Run


      Before publishing a new artifact shape, run:


      ```bash

      cyanprint push . --dry-run

      ```


      Dry run validates the manifest, bundle, dependencies, object model, and
      archive rules without committing a version.


      ## Final Review


      Before the real push, inspect the diff against the previous version:


      - For templates, confirm every new common path has a resolver decision.

      - For processors, confirm generated output does not depend on clock,
      random, host, or network state.

      - For plugins, confirm repeated execution is stable.

      - For resolvers, confirm same resolver plus same config can safely merge
      all intended candidates.
  - path: .cyan/skills/cyanprint-searching.md
    sha256: 5ef1f47389fcf642d18b34d773e99299c8cbb7222d3449dbcd321a246a7b7d79
    content: >
      # CyanPrint Searching Skill


      Use this before adding or changing dependencies.


      ## Search Commands


      ```bash

      cyanprint search <query>

      cyanprint search --kind template <query>

      cyanprint search --kind processor <query>

      cyanprint search --kind plugin <query>

      cyanprint search --kind resolver <query>

      ```


      ## Choosing Dependencies


      - Prefer official `cyan/*` artifacts when they fit.

      - Prefer a processor over local ad hoc rendering when a file type already
      has a stable formatter or renderer.

      - Prefer a resolver over last-writer-wins when two templates write the
      same path intentionally.

      - Prefer a plugin for deterministic finalization, such as pre-commit
      config, package script normalization, or idempotent Git setup.

      - Avoid copying dependency behavior into this artifact unless the behavior
      is truly private to this artifact.

      - Add dependencies to `cyan.yaml` without versions unless you
      intentionally need an older pinned version.

      - After adding a dependency, add a test fixture that proves the dependency
      is invoked and that the returned artifact ref is declared.


      ## Search Questions


      Before choosing an artifact, answer these:


      - Does this template write common files such as `README.md`, ignore files,
      Nix, package manifests, CI, Claude/Codex/agent docs, or IDE config?

      - Is there an official resolver for that path or file format?

      - Is the resolver commutative for the way this template will share the
      file?

      - Does the processor produce deterministic output from only `{ files,
      config }`?

      - Is the plugin idempotent if it runs during create, try, update, and
      dependency installation?

      - Does the dependency README include fixtures for the behavior you are
      relying on?


      ## Search in the Web UI


      Use the registry search page for discovery and README review. Keep the URL
      query when sharing a dependency candidate with another agent so they see
      the same kind filter and query.
  - path: .cyan/skills/cyanprint-updating.md
    sha256: fbe5576aaed6ba097670c585776810a080a5dc7fea514abbf4a3866fdba79586
    content: >
      # CyanPrint Updating Skill


      Use this when changing behavior, fixtures, prompts, dependencies,
      generated output, or merge behavior.


      ## Update Checklist


      1. Read `cyan.yaml` and identify the artifact kind.

      2. Read `README.md` and the relevant `.cyan/skills/*` files before editing
      behavior.

      3. Update source and fixture files together. Do not change behavior
      without a test fixture that shows the new output.

      4. Run `bun run build` when `cyan.ts` or `src/index.ts` imports packages
      or when `bundledEntry` points into `dist/`.

      5. Run `bun run test` or the equivalent `cyanprint test .` command.

      6. Update README examples and dependency notes if the public behavior
      changed.

      7. Check whether the change creates new overlap on common files such as
      README, ignore files, Nix, package manifests, CI, or agent docs. Add
      resolvers when overlap is intentional.


      ## Template Updates


      For templates, update all three layers together:


      - `cyan.ts` prompt and returned pure Cyan object

      - files under `template/`

      - expected output fixtures under `expected/`


      Before changing generated files, decide the processor and resolver plan:


      - Which files are rendered with `Template` and which are copied with
      `Copy`?

      - Which processor handles Markdown, JSON, YAML, Nix, TypeScript, package
      manifests, or generated code?

      - Which files are likely to overlap with dependency templates?

      - Does each overlapping file have a declared resolver with stable config?

      - Are dependency answers deterministic and covered by a fixture?


      Use snapshot updates only when the output change is intentional:


      ```bash

      bun run build

      cyanprint test . --answers answers.json --update-snapshots

      ```


      Then inspect the changed expected files manually. A snapshot update is not
      a substitute for review.


      ## Processor Updates


      - Add or update `tests/<case>/input` and `tests/<case>/expected`.

      - Include at least one fixture that proves deterministic input to output
      behavior.

      - Run the same processor test twice or inspect that no fixture changes
      after a second run.

      - Use `config` in `cyan.test.yaml` for behavior that depends on options.

      - Include command validations for behavior that is easier to assert with
      code, such as JSON parseability, package installability, exact formatting,
      or generated lockfile absence.

      - Do not add behavior that depends on time, random values, host paths,
      network access, or environment variables unless those values are explicit
      config inputs.


      ## Plugin Updates


      - Treat plugins as deterministic finalizers.

      - Add a fixture proving the plugin is idempotent. Running it twice should
      not duplicate hooks, ignore lines, package scripts, pre-commit config, or
      Git metadata.

      - For `pre-commit run --all-files`, include config generation plus a
      validation command. Do not silently require global tools.

      - For Git initialization, create missing files only and avoid overwriting
      remotes, user identity, branches, or existing history.

      - Keep shell execution optional, explicit, and documented. Prefer
      modifying the Cyan file map.


      ## Resolver Updates


      - Include fixtures that represent actual conflict shapes.

      - Keep resolver config small, serializable, and stable.

      - Verify expired assumptions: if a resolver used to receive two files, add
      a test for three or more files if multiple templates can now converge on
      the path.

      - Prove commutativity when the resolver is intended to be
      order-independent by adding reversed-order fixtures.

      - Prove idempotency by including duplicate or identical candidates.

      - If order matters, document the metadata field used for ordering and add
      a fixture that proves the order policy.
  - path: .github/workflows/ci.yml
    sha256: 40dfb6ad1af58fe663c317ef70de727355f3c0df7694f22a990b06fa6dead54a
    content: >
      name: cyanprint


      on:
        push:
        pull_request:

      jobs:
        test:
          runs-on: ubuntu-latest
          env:
            GEMFURY_READ_TOKEN: ${{ secrets.GEMFURY_READ_TOKEN }}
          steps:
            - uses: actions/checkout@v4
            - name: Install CyanPrint from Gemfury
              run: |
                set -euo pipefail
                repo_url="https://apt.fury.io/atomicloud/"
                if [ -n "${GEMFURY_READ_TOKEN:-}" ]; then
                  repo_url="https://${GEMFURY_READ_TOKEN}@apt.fury.io/atomicloud/"
                fi
                printf 'deb [trusted=yes] %s /\n' "$repo_url" | sudo tee /etc/apt/sources.list.d/atomicloud-gemfury.list >/dev/null
                sudo apt-get update
                sudo apt-get install -y cyanprint
            - name: Test artifact
              run: bun run test
